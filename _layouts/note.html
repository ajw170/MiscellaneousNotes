---
layout: default
---

<article class="note">
  <header class="note-header">
    <h1 class="note-title">{{ page.title }}</h1>
    {% if page.date %}
    <p class="note-meta">{{ page.date | date: "%B %d, %Y" }}</p>
    {% endif %}
    {% if page.tags and page.tags.size > 0 %}
    <p class="note-tags">
      {% for tag in page.tags %}
      <span class="tag">{{ tag }}</span>
      {% endfor %}
    </p>
    {% endif %}
  </header>

  <div class="note-content">
    {{ content }}
  </div>
</article>
